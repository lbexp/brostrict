<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Brostrict</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu,
          sans-serif;
        width: 320px;
        background: #1a1a2e;
        color: #eee;
        padding: 20px;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 20px;
        color: #e94560;
        text-align: center;
      }
      .container {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .section {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .section h3 {
        font-size: 0.9rem;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .input-row {
        display: flex;
        gap: 8px;
      }
      .input-row input {
        flex: 1;
        padding: 8px 12px;
        border: 1px solid #333;
        border-radius: 6px;
        background: #16213e;
        color: #eee;
        font-size: 0.9rem;
      }
      .input-row input:focus {
        outline: none;
        border-color: #e94560;
      }
      .input-row button {
        padding: 8px 16px;
        background: #e94560;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.9rem;
        transition: background 0.2s;
      }
      .input-row button:hover {
        background: #d63651;
      }
      .list {
        list-style: none;
        max-height: 120px;
        overflow-y: auto;
      }
      .list::-webkit-scrollbar {
        width: 6px;
      }
      .list::-webkit-scrollbar-track {
        background: #16213e;
      }
      .list::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 3px;
      }
      .list-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 12px;
        background: #16213e;
        border-radius: 6px;
        margin-bottom: 6px;
        font-size: 0.85rem;
      }
      .list-item span {
        word-break: break-all;
      }
      .remove-btn {
        background: transparent;
        color: #e94560;
        border: none;
        font-size: 1.2rem;
        cursor: pointer;
        padding: 0 4px;
        margin-left: 8px;
      }
      .remove-btn:hover {
        color: #ff6b6b;
      }
      .toggle-wrapper {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 16px;
        background: #16213e;
        border-radius: 8px;
      }
      .toggle-wrapper span {
        font-weight: 500;
      }
      #toggle {
        padding: 8px 20px;
        border: none;
        border-radius: 20px;
        font-size: 0.85rem;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s;
      }
      #toggle.active {
        background: #00d26a;
        color: #1a1a2e;
      }
      #toggle.inactive {
        background: #444;
        color: #888;
      }
    </style>
  </head>
  <body>
    <h1>🛡️ Brostrict</h1>
    <div id="app" />
    <script src="index.js"></script>
  </body>
</html>
