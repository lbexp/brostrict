<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Blocked - Brostrict</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --paper: #f6efe2;
        --panel: #fffdf7;
        --ink: #141210;
        --ink-soft: #55504a;
        --red: #e6301e;
        --red-dark: #c92a12;
        --green: #2f9e44;
        --green-soft: #dcf2e3;
        --yellow: #ffd43b;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        color-scheme: light;
      }
      body {
        font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--paper);
        background-image: radial-gradient(circle, rgba(20, 18, 16, 0.07) 1px, transparent 1.3px);
        background-size: 10px 10px;
        color: var(--ink);
        padding: 24px;
        text-align: center;
        overflow: hidden;
      }
      /* radiating concentration lines */
      body::before {
        content: '';
        position: fixed;
        inset: -50%;
        background: repeating-conic-gradient(
          from 0deg at 50% 44%,
          rgba(20, 18, 16, 0.06) 0deg 0.7deg,
          transparent 0.7deg 6deg
        );
        -webkit-mask-image: radial-gradient(circle at 50% 44%, black 0%, transparent 62%);
        mask-image: radial-gradient(circle at 50% 44%, black 0%, transparent 62%);
        animation: linespin 40s linear infinite;
        pointer-events: none;
      }
      @keyframes linespin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @media (prefers-reduced-motion: reduce) {
        body::before {
          animation: none;
        }
        .emblem {
          animation: none;
        }
      }
      .container {
        position: relative;
        max-width: 460px;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .emblem {
        position: relative;
        width: 150px;
        height: 150px;
        margin-bottom: 22px;
        animation: patpat 1.6s ease-in-out infinite;
      }
      @keyframes patpat {
        0%, 100% { transform: translateY(0) rotate(-1deg); }
        50% { transform: translateY(-4px) rotate(1.5deg); }
      }
      .emblem > svg {
        display: block;
        width: 150px;
        height: 150px;
        filter: drop-shadow(5px 5px 0 rgba(20, 18, 16, 0.9));
      }
      /* bro's unsolicited wisdom */
      .speech-bubble {
        position: relative;
        align-self: flex-end;
        margin-right: 24px;
        margin-bottom: 14px;
        background: var(--panel);
        border: 2.5px solid var(--ink);
        border-radius: 14px;
        padding: 8px 16px;
        font-family: 'Bangers', 'Impact', sans-serif;
        font-size: 1.15rem;
        letter-spacing: 1.2px;
        color: var(--ink);
        box-shadow: 3.5px 3.5px 0 var(--ink);
        transform: rotate(2deg);
        z-index: 1;
      }
      .speech-bubble::before,
      .speech-bubble::after {
        content: '';
        position: absolute;
        left: 62%;
        border-left: 9px solid transparent;
        border-right: 9px solid transparent;
      }
      .speech-bubble::before {
        bottom: -14px;
        border-top: 13px solid var(--ink);
      }
      .speech-bubble::after {
        bottom: -10px;
        border-top: 13px solid var(--panel);
      }
      h1 {
        font-family: 'Bangers', 'Impact', sans-serif;
        font-size: 3.4rem;
        font-weight: 400;
        color: var(--ink);
        letter-spacing: 3px;
        line-height: 1;
        margin-bottom: 12px;
        transform: skew(-4deg);
        text-shadow: 4px 4px 0 var(--red);
      }
      .url-chip {
        display: none;
        align-items: center;
        gap: 8px;
        max-width: 100%;
        background: var(--panel);
        border: 2.5px solid var(--ink);
        border-radius: 999px;
        padding: 8px 16px;
        margin-bottom: 20px;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.74rem;
        font-weight: 500;
        color: var(--ink);
        box-shadow: 3px 3px 0 var(--ink);
        transform: rotate(-1deg);
      }
      .url-chip::before {
        content: '';
        flex-shrink: 0;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        border: 2px solid var(--red);
        background: linear-gradient(to bottom right, transparent 42%, var(--red) 42%, var(--red) 58%, transparent 58%);
      }
      .url-chip span {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      /* bro's reluctant permission slip */
      .notice {
        background: var(--green-soft);
        border: 2.5px solid var(--ink);
        border-radius: 12px;
        padding: 11px 18px;
        margin-bottom: 22px;
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--ink);
        box-shadow: 4px 4px 0 var(--ink);
        transform: rotate(-1deg);
        display: none;
      }
      .button-group {
        display: flex;
        gap: 14px;
        justify-content: center;
        flex-wrap: wrap;
      }
      button {
        background: var(--red);
        color: var(--paper);
        border: 3px solid var(--ink);
        padding: 12px 28px;
        font-size: 1.05rem;
        font-weight: 400;
        letter-spacing: 2px;
        text-transform: uppercase;
        font-family: 'Bangers', 'Impact', sans-serif;
        border-radius: 12px;
        cursor: pointer;
        box-shadow: 4px 4px 0 var(--ink);
        transition: all 0.15s ease;
      }
      button:hover {
        background: var(--red-dark);
        transform: translate(-2px, -2px);
        box-shadow: 6px 6px 0 var(--ink);
      }
      button:active {
        transform: translate(3px, 3px);
        box-shadow: 1px 1px 0 var(--ink);
      }
      button.secondary {
        background: var(--panel);
        color: var(--ink);
      }
      button.secondary:hover {
        background: var(--yellow);
      }
      button:focus-visible {
        outline: 3px dashed var(--red);
        outline-offset: 3px;
      }
      .footer {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 36px;
        transform: rotate(-1deg);
      }
      .footer svg {
        display: block;
        width: 18px;
        height: 18px;
      }
      .footer span {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.6rem;
        color: var(--ink-soft);
        text-transform: uppercase;
        letter-spacing: 2.4px;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="speech-bubble">Go touch grass, lil bro.</div>
      <div class="emblem">
        <svg width="150" height="150" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <clipPath id="jacket-clip-b">
              <path d="M66 84 Q90 76 135 80 L135 135 L60 135 Z" />
            </clipPath>
            <pattern id="tone-b" width="7" height="7" patternUnits="userSpaceOnUse">
              <circle cx="2" cy="2" r="1.5" fill="rgba(0,0,0,0.16)" />
            </pattern>
          </defs>
          <!-- the man: neck + body -->
          <path d="M86 58 L95 58 L95 86 Q90 89 85 86 Z" fill="#eec39a" />
          <path d="M66 84 Q90 76 135 80 L135 135 L60 135 Z" fill="#e6301e" stroke="#141210" stroke-width="4" stroke-linejoin="round" />
          <rect x="58" y="74" width="80" height="64" fill="url(#tone-b)" clip-path="url(#jacket-clip-b)" />
          <path d="M84 84 L90 91 L97 84" fill="none" stroke="#141210" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M104 79 Q109 87 107 97" fill="none" stroke="#141210" stroke-width="3" stroke-linecap="round" />
          <!-- the man: head -->
          <path d="M76 31 Q73 45 77 55 Q81 65 90 65 Q100 65 103 53 Q106 41 102 31 Q90 25 76 31 Z" fill="#eec39a" stroke="#141210" stroke-width="4" stroke-linejoin="round" />
          <path d="M72 38 Q63 15 84 10 Q91 3 103 6 Q115 9 113 20 Q119 25 111 32 Q113 24 103 23 Q107 29 98 29 Q91 23 83 27 Q75 31 72 38 Z" fill="#141210" />
          <line x1="79" y1="39" x2="88" y2="37.5" stroke="#141210" stroke-width="3" stroke-linecap="round" />
          <line x1="93" y1="37.5" x2="101" y2="39" stroke="#141210" stroke-width="3" stroke-linecap="round" />
          <ellipse cx="84" cy="45" rx="4.2" ry="3" fill="#fffdf7" stroke="#141210" stroke-width="2.2" />
          <ellipse cx="96" cy="45" rx="4.2" ry="3" fill="#fffdf7" stroke="#141210" stroke-width="2.2" />
          <circle cx="82.3" cy="45" r="1.7" fill="#141210" />
          <circle cx="94.3" cy="45" r="1.7" fill="#141210" />
          <path d="M90 49 L92 53" fill="none" stroke="#141210" stroke-width="2.2" stroke-linecap="round" />
          <path d="M83 57 Q90 61 97 56" fill="none" stroke="#141210" stroke-width="3" stroke-linecap="round" />
          <!-- the kid -->
          <path d="M14 98 Q38 88 62 92 L66 135 L10 135 Z" fill="#fffdf7" stroke="#141210" stroke-width="4" stroke-linejoin="round" />
          <path d="M26 50 Q22 66 29 76 Q37 84 46 81 Q55 76 57 62 Q58 51 52 46 Q39 40 26 50 Z" fill="#f6d7b0" stroke="#141210" stroke-width="4" stroke-linejoin="round" />
          <path d="M23 51 Q18 32 40 30 Q61 30 58 50 Q55 41 44 40 Q34 40 29 44 Q25 48 23 51 Z" fill="#141210" />
          <line x1="30" y1="57" x2="36" y2="55" stroke="#141210" stroke-width="3" stroke-linecap="round" />
          <line x1="45" y1="55" x2="51" y2="57" stroke="#141210" stroke-width="3" stroke-linecap="round" />
          <circle cx="34" cy="63" r="4.8" fill="#fffdf7" stroke="#141210" stroke-width="2.5" />
          <circle cx="47" cy="63" r="4.8" fill="#fffdf7" stroke="#141210" stroke-width="2.5" />
          <circle cx="36" cy="61.5" r="2.1" fill="#141210" />
          <circle cx="49" cy="61.5" r="2.1" fill="#141210" />
          <ellipse cx="41" cy="74" rx="3" ry="3.8" fill="#141210" />
          <path d="M19 40 C 23 46 25 49 25 53 A 6 6 0 1 1 13 53 C 13 49 15 46 19 40 Z" fill="#9fd3ff" stroke="#141210" stroke-width="2" />
          <!-- the hand on the shoulder -->
          <path d="M112 84 Q88 76 66 82 L60 86 Q57 90 61 93 Q86 90 108 96 Z" fill="#e6301e" stroke="#141210" stroke-width="4" stroke-linejoin="round" />
          <path d="M64 80 Q56 76 50 81 Q44 86 46 92 Q43 97 48 100 Q47 106 53 107 Q53 113 60 111 Q65 115 68 108 Q72 102 71 93 Q71 85 64 80 Z" fill="#eec39a" stroke="#141210" stroke-width="3.5" stroke-linejoin="round" />
          <line x1="49" y1="88" x2="57" y2="90" stroke="#141210" stroke-width="2" stroke-linecap="round" />
          <line x1="48" y1="96" x2="56" y2="98" stroke="#141210" stroke-width="2" stroke-linecap="round" />
          <line x1="50" y1="104" x2="58" y2="105" stroke="#141210" stroke-width="2" stroke-linecap="round" />
          <line x1="74" y1="79" x2="80" y2="73" stroke="#141210" stroke-width="3" stroke-linecap="round" />
          <line x1="77" y1="88" x2="84" y2="85" stroke="#141210" stroke-width="3" stroke-linecap="round" />
        </svg>
      </div>
      <h1>Bro-tervention.</h1>
      <div class="url-chip" id="url-chip"><span id="url-host"></span></div>
      <div class="notice" id="notice">
        Aight bet, this one gets a pass.
      </div>
      <div class="button-group">
        <button id="proceed-btn" style="display: none;">Bet, Watch Me</button>
        <button id="go-back-btn" class="secondary">Say Less</button>
      </div>
      <div class="footer">
        <svg width="18" height="18" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="122" height="122" rx="24" fill="#f6efe2" stroke="#141210" stroke-width="6" />
          <path d="M66 84 Q90 76 125 82 L125 125 L60 125 Z" fill="#e6301e" stroke="#141210" stroke-width="5" stroke-linejoin="round" />
          <path d="M76 31 Q73 45 77 55 Q81 65 90 65 Q100 65 103 53 Q106 41 102 31 Q90 25 76 31 Z" fill="#eec39a" stroke="#141210" stroke-width="5" stroke-linejoin="round" />
          <path d="M72 38 Q63 15 84 10 Q91 3 103 6 Q115 9 113 20 Q119 25 111 32 Q113 24 103 23 Q107 29 98 29 Q91 23 83 27 Q75 31 72 38 Z" fill="#141210" />
          <path d="M14 98 Q38 88 62 92 L66 125 L10 125 Z" fill="#fffdf7" stroke="#141210" stroke-width="5" stroke-linejoin="round" />
          <path d="M26 50 Q22 66 29 76 Q37 84 46 81 Q55 76 57 62 Q58 51 52 46 Q39 40 26 50 Z" fill="#f6d7b0" stroke="#141210" stroke-width="5" stroke-linejoin="round" />
          <path d="M23 51 Q18 32 40 30 Q61 30 58 50 Q55 41 44 40 Q34 40 29 44 Q25 48 23 51 Z" fill="#141210" />
          <path d="M64 80 Q56 76 50 81 Q44 86 46 92 Q43 97 48 100 Q47 106 53 107 Q53 113 60 111 Q65 115 68 108 Q72 102 71 93 Q71 85 64 80 Z" fill="#eec39a" stroke="#141210" stroke-width="4.5" stroke-linejoin="round" />
        </svg>
        <span>Brostrict — your personal nah machine</span>
      </div>
    </div>
    <script>
      let detectedUrl = '';
      if (window.location.ancestorOrigins && window.location.ancestorOrigins.length > 0) {
        detectedUrl = window.location.ancestorOrigins[0];
      } else if (document.referrer) {
        detectedUrl = document.referrer;
      }

      if (detectedUrl) {
        try {
          const host = new URL(detectedUrl).hostname;
          if (host) {
            document.getElementById('url-host').textContent = host;
            document.getElementById('url-chip').style.display = 'inline-flex';
          }
        } catch {
          // no valid URL detected — chip stays hidden
        }

        chrome.runtime.sendMessage({ type: 'isWhitelisted', url: detectedUrl }, (response) => {
          if (response && response.result) {
            document.getElementById('notice').style.display = 'block';
            document.getElementById('proceed-btn').style.display = 'inline-block';
          }
        });
      }

      document.getElementById('proceed-btn').addEventListener('click', () => {
        if (detectedUrl) {
          window.location.href = detectedUrl;
        }
      });

      document.getElementById('go-back-btn').addEventListener('click', () => {
        if (window.history.length > 1) {
          window.history.back();
        } else if (detectedUrl) {
          try {
            const domain = new URL(detectedUrl).hostname;
            window.location.href = 'https://' + domain;
          } catch {
            window.close();
          }
        } else {
          window.close();
        }
      });
    </script>
  </body>
</html>
