<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Brostrict</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Fredoka', -apple-system, BlinkMacSystemFont, sans-serif;
        width: 280px;
        background: #faf8f3;
        color: #1a1a1a;
        padding: 16px;
      }
      .header {
        text-align: center;
        margin-bottom: 16px;
      }
      .logo {
        font-size: 1.5rem;
        font-weight: 700;
        color: #000000;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .logo::before {
        content: "🛡️";
        font-size: 1.3rem;
      }
      .main-switch {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background: #ffffff;
        border: 3px solid #000000;
        border-radius: 50px;
        padding: 12px 20px;
        margin-bottom: 16px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .main-switch:hover {
        transform: scale(1.02);
      }
      .main-switch:active {
        transform: scale(0.98);
      }
      .switch-label {
        font-size: 0.9rem;
        font-weight: 600;
      }
      .switch-pill {
        width: 48px;
        height: 28px;
        background: #e0e0e0;
        border: 3px solid #000000;
        border-radius: 14px;
        position: relative;
        transition: all 0.2s;
      }
      .switch-pill.active {
        background: #000000;
      }
      .switch-dot {
        width: 16px;
        height: 16px;
        background: #000000;
        border-radius: 50%;
        position: absolute;
        top: 3px;
        left: 3px;
        transition: all 0.2s;
      }
      .switch-pill.active .switch-dot {
        left: 23px;
        background: #ffffff;
      }
      .section {
        background: #ffffff;
        border: 3px solid #000000;
        border-radius: 20px;
        padding: 14px;
        margin-bottom: 12px;
      }
      .section-title {
        font-size: 0.8rem;
        font-weight: 700;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .section-title.block::before {
        content: "🚫";
      }
      .section-title.allow::before {
        content: "✓";
      }
      .input-wrap {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
      }
      .input-wrap input {
        flex: 1;
        padding: 10px 12px;
        border: 3px solid #000000;
        border-radius: 12px;
        background: #ffffff;
        color: #000000;
        font-size: 0.8rem;
        font-family: 'IBM Plex Mono', monospace;
      }
      .input-wrap input:focus {
        outline: none;
        background: #fafafa;
      }
      .input-wrap input::placeholder {
        color: #999;
      }
      .btn {
        padding: 10px 14px;
        background: #000000;
        color: #ffffff;
        border: 3px solid #000000;
        border-radius: 12px;
        cursor: pointer;
        font-size: 0.75rem;
        font-weight: 600;
        font-family: 'Fredoka', sans-serif;
        transition: all 0.15s;
      }
      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 3px 0 #000000;
      }
      .btn:active {
        transform: translateY(0);
        box-shadow: none;
      }
      .items {
        display: flex;
        flex-direction: column;
        gap: 6px;
        max-height: 90px;
        overflow-y: auto;
      }
      .items::-webkit-scrollbar {
        width: 4px;
      }
      .items::-webkit-scrollbar-thumb {
        background: #000000;
        border-radius: 2px;
      }
      .item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 10px;
        background: #f5f5f5;
        border: 2px solid #000000;
        border-radius: 10px;
        font-size: 0.75rem;
      }
      .item span {
        font-family: 'IBM Plex Mono', monospace;
        color: #333;
      }
      .item .del {
        background: none;
        border: none;
        font-size: 1rem;
        cursor: pointer;
        padding: 0 2px;
        opacity: 0.6;
        transition: opacity 0.2s;
      }
      .item .del:hover {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo">Brostrict</div>
    </div>
    <div id="app"></div>
    <script src="index.js"></script>
  </body>
</html>
