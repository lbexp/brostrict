<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Blocked - Brostrict</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Fredoka', -apple-system, BlinkMacSystemFont, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #faf8f3;
        color: #1a1a1a;
        padding: 24px;
        text-align: center;
      }
      .mascot {
        width: 120px;
        height: 120px;
        margin: 0 auto 24px;
        background: #ffffff;
        border: 4px solid #000000;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3.5rem;
        animation: bounce 2s ease-in-out infinite;
      }
      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      h1 {
        font-size: 2.5rem;
        font-weight: 700;
        color: #000000;
        margin-bottom: 24px;
        letter-spacing: 1px;
      }
      .notice {
        background: #ffffff;
        border: 3px solid #000000;
        border-radius: 16px;
        padding: 14px 20px;
        margin-bottom: 24px;
        font-size: 0.85rem;
        font-weight: 600;
        display: none;
      }
      .actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }
      button {
        padding: 14px 28px;
        font-size: 1rem;
        font-weight: 600;
        font-family: 'Fredoka', sans-serif;
        border: 3px solid #000000;
        border-radius: 14px;
        cursor: pointer;
        transition: all 0.15s;
      }
      button.primary {
        background: #000000;
        color: #ffffff;
      }
      button.primary:hover {
        transform: translateY(-3px);
        box-shadow: 0 4px 0 #000000;
      }
      button.secondary {
        background: #ffffff;
        color: #000000;
      }
      button.secondary:hover {
        transform: translateY(-3px);
        box-shadow: 0 4px 0 #000000;
      }
      button:active {
        transform: translateY(0);
        box-shadow: none;
      }
    </style>
  </head>
  <body>
    <div class="mascot">🛡️</div>
    <h1>Blocked!</h1>
    <div class="notice" id="notice">
      Whitelisted — you may proceed
    </div>
    <div class="actions">
      <button id="proceed-btn" class="primary" style="display: none;">Proceed</button>
      <button id="go-back-btn" class="secondary">Go Back</button>
    </div>
    <script>
      let detectedUrl = '';
      if (window.location.ancestorOrigins && window.location.ancestorOrigins.length > 0) {
        detectedUrl = window.location.ancestorOrigins[0];
      } else if (document.referrer) {
        detectedUrl = document.referrer;
      }

      if (detectedUrl) {
        chrome.runtime.sendMessage({ type: 'isWhitelisted', url: detectedUrl }, (response) => {
          if (response && response.result) {
            document.getElementById('notice').style.display = 'block';
            document.getElementById('proceed-btn').style.display = 'inline-block';
          }
        });
      }

      document.getElementById('proceed-btn').addEventListener('click', () => {
        if (detectedUrl) {
          window.location.href = detectedUrl;
        }
      });

      document.getElementById('go-back-btn').addEventListener('click', () => {
        if (window.history.length > 1) {
          window.history.back();
        } else if (detectedUrl) {
          try {
            const domain = new URL(detectedUrl).hostname;
            window.location.href = 'https://' + domain;
          } catch {
            window.close();
          }
        } else {
          window.close();
        }
      });
    </script>
  </body>
</html>
