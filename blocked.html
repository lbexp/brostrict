<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Blocked - Brostrict</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;600&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Comfortaa', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        color: #e5e5e5;
        padding: 20px;
        text-align: center;
      }
      .container {
        max-width: 420px;
        width: 100%;
      }
      .icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 24px;
        background: #111111;
        border: 2px solid #222;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        color: #fff;
      }
      h1 {
        font-size: 2rem;
        font-weight: 600;
        color: #ffffff;
        margin-bottom: 8px;
        letter-spacing: -0.5px;
      }
      .subtitle {
        font-size: 0.75rem;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 24px;
        font-weight: 300;
      }
      .blocked-url {
        background: #111111;
        border: 1px solid #1e1e1e;
        border-radius: 12px;
        padding: 14px 18px;
        margin-bottom: 20px;
        word-break: break-all;
        font-family: 'IBM Plex Mono', monospace;
        color: #888;
        font-size: 0.8rem;
      }
      .notice {
        background: #111111;
        border: 1px solid #222;
        border-radius: 12px;
        padding: 12px 16px;
        margin-bottom: 20px;
        font-size: 0.75rem;
        color: #666;
        display: none;
      }
      .button-group {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }
      button {
        background: #ffffff;
        color: #0a0a0a;
        border: none;
        padding: 14px 28px;
        font-size: 0.85rem;
        font-weight: 600;
        font-family: 'Comfortaa', sans-serif;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s;
      }
      button:hover {
        background: #e5e5e5;
        transform: translateY(-2px);
      }
      button:active {
        transform: translateY(0);
      }
      button.secondary {
        background: transparent;
        border: 1px solid #333;
        color: #888;
      }
      button.secondary:hover {
        background: #111111;
        border-color: #444;
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">✕</div>
      <h1>Blocked</h1>
      <p class="subtitle">Site restricted by Brostrict</p>
      <div class="blocked-url" id="blocked-url">Loading...</div>
      <div class="notice" id="notice">
        This URL is whitelisted — you may proceed
      </div>
      <div class="button-group">
        <button id="proceed-btn" style="display: none;">Proceed</button>
        <button id="go-back-btn" class="secondary">Go Back</button>
      </div>
    </div>
    <script>
      let detectedUrl = '';
      if (window.location.ancestorOrigins && window.location.ancestorOrigins.length > 0) {
        detectedUrl = window.location.ancestorOrigins[0];
      } else if (document.referrer) {
        detectedUrl = document.referrer;
      }
      document.getElementById('blocked-url').textContent = detectedUrl || 'Unknown URL';

      if (detectedUrl) {
        chrome.runtime.sendMessage({ type: 'isWhitelisted', url: detectedUrl }, (response) => {
          if (response && response.result) {
            document.getElementById('notice').style.display = 'block';
            document.getElementById('proceed-btn').style.display = 'inline-block';
          }
        });
      }

      document.getElementById('proceed-btn').addEventListener('click', () => {
        if (detectedUrl) {
          window.location.href = detectedUrl;
        }
      });

      document.getElementById('go-back-btn').addEventListener('click', () => {
        if (window.history.length > 1) {
          window.history.back();
        } else if (detectedUrl) {
          try {
            const domain = new URL(detectedUrl).hostname;
            window.location.href = 'https://' + domain;
          } catch {
            window.close();
          }
        } else {
          window.close();
        }
      });
    </script>
  </body>
</html>
