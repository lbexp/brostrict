<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Blocked - Brostrict</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --paper: #f6efe2;
        --panel: #fffdf7;
        --ink: #141210;
        --ink-soft: #55504a;
        --red: #e6301e;
        --red-dark: #c92a12;
        --green: #2f9e44;
        --yellow: #ffd43b;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        color-scheme: light;
      }
      body {
        font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--paper);
        background-image: radial-gradient(circle, rgba(20, 18, 16, 0.07) 1px, transparent 1.3px);
        background-size: 10px 10px;
        color: var(--ink);
        padding: 24px;
        text-align: center;
        overflow: hidden;
      }
      /* radiating concentration lines */
      body::before {
        content: '';
        position: fixed;
        inset: -50%;
        background: repeating-conic-gradient(
          from 0deg at 50% 44%,
          rgba(20, 18, 16, 0.06) 0deg 0.7deg,
          transparent 0.7deg 6deg
        );
        -webkit-mask-image: radial-gradient(circle at 50% 44%, black 0%, transparent 62%);
        mask-image: radial-gradient(circle at 50% 44%, black 0%, transparent 62%);
        animation: linespin 40s linear infinite;
        pointer-events: none;
      }
      @keyframes linespin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @media (prefers-reduced-motion: reduce) {
        body::before {
          animation: none;
        }
        .emblem {
          animation: none;
        }
      }
      .container {
        position: relative;
        max-width: 460px;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .emblem {
        position: relative;
        width: 120px;
        height: 120px;
        margin-bottom: 26px;
        animation: throb 1.6s ease-in-out infinite;
      }
      @keyframes throb {
        0%, 100% { transform: scale(1) rotate(-2deg); }
        50% { transform: scale(1.05) rotate(2deg); }
      }
      .emblem > svg {
        display: block;
        width: 120px;
        height: 120px;
        filter: drop-shadow(5px 5px 0 rgba(20, 18, 16, 0.9));
      }
      /* the referee's red card */
      .red-card {
        position: absolute;
        top: -12px;
        right: -26px;
        width: 34px;
        height: 46px;
        background: var(--red);
        border: 3px solid var(--ink);
        border-radius: 5px;
        transform: rotate(14deg);
        box-shadow: 3px 3px 0 var(--ink);
        animation: cardflash 1.6s ease-in-out infinite;
      }
      @keyframes cardflash {
        0%, 100% { transform: rotate(14deg) translateY(0); }
        50% { transform: rotate(10deg) translateY(-4px); }
      }
      h1 {
        font-family: 'Bangers', 'Impact', sans-serif;
        font-size: 3.4rem;
        font-weight: 400;
        color: var(--ink);
        letter-spacing: 3px;
        line-height: 1;
        margin-bottom: 12px;
        transform: skew(-4deg);
        text-shadow: 4px 4px 0 var(--red);
      }
      .subtitle {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.68rem;
        color: var(--ink-soft);
        text-transform: uppercase;
        letter-spacing: 2.8px;
        margin-bottom: 22px;
        font-weight: 500;
      }
      .url-chip {
        display: none;
        align-items: center;
        gap: 8px;
        max-width: 100%;
        background: var(--panel);
        border: 2.5px solid var(--ink);
        border-radius: 999px;
        padding: 8px 16px;
        margin-bottom: 20px;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.74rem;
        font-weight: 500;
        color: var(--ink);
        box-shadow: 3px 3px 0 var(--ink);
        transform: rotate(-1deg);
      }
      .url-chip::before {
        content: '';
        flex-shrink: 0;
        width: 8px;
        height: 11px;
        background: var(--red);
        border: 1.5px solid var(--ink);
        border-radius: 1.5px;
        transform: rotate(6deg);
      }
      .url-chip span {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      /* yellow card warning */
      .notice {
        background: var(--yellow);
        border: 2.5px solid var(--ink);
        border-radius: 12px;
        padding: 11px 18px;
        margin-bottom: 22px;
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--ink);
        box-shadow: 4px 4px 0 var(--ink);
        transform: rotate(-1deg);
        display: none;
      }
      .button-group {
        display: flex;
        gap: 14px;
        justify-content: center;
        flex-wrap: wrap;
      }
      button {
        background: var(--red);
        color: var(--paper);
        border: 3px solid var(--ink);
        padding: 12px 28px;
        font-size: 1.05rem;
        font-weight: 400;
        letter-spacing: 2px;
        text-transform: uppercase;
        font-family: 'Bangers', 'Impact', sans-serif;
        border-radius: 12px;
        cursor: pointer;
        box-shadow: 4px 4px 0 var(--ink);
        transition: all 0.15s ease;
      }
      button:hover {
        background: var(--red-dark);
        transform: translate(-2px, -2px);
        box-shadow: 6px 6px 0 var(--ink);
      }
      button:active {
        transform: translate(3px, 3px);
        box-shadow: 1px 1px 0 var(--ink);
      }
      button.secondary {
        background: var(--panel);
        color: var(--ink);
      }
      button.secondary:hover {
        background: var(--yellow);
      }
      button:focus-visible {
        outline: 3px dashed var(--red);
        outline-offset: 3px;
      }
      .footer {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 36px;
        transform: rotate(-1deg);
      }
      .footer svg {
        display: block;
        width: 18px;
        height: 18px;
      }
      .footer span {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.6rem;
        color: var(--ink-soft);
        text-transform: uppercase;
        letter-spacing: 2.4px;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="emblem">
        <svg width="120" height="120" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <clipPath id="shield-clip-b">
              <path d="M64 22 L98 33 V61 C98 84 83 100 64 109 C45 100 30 84 30 61 V33 Z" />
            </clipPath>
            <pattern id="tone-b" width="7" height="7" patternUnits="userSpaceOnUse">
              <circle cx="2" cy="2" r="1.5" fill="rgba(0,0,0,0.16)" />
            </pattern>
          </defs>
          <!-- anger mark -->
          <g transform="translate(24 20) rotate(-14)">
            <rect x="-13" y="-4" width="26" height="8" rx="4" fill="#c92a12" stroke="#141210" stroke-width="2" transform="rotate(45)" />
            <rect x="-13" y="-4" width="26" height="8" rx="4" fill="#c92a12" stroke="#141210" stroke-width="2" transform="rotate(-45)" />
          </g>
          <!-- sweat drop -->
          <path d="M106 22 C 111 30 114 34 114 39 A 8 8 0 1 1 98 39 C 98 34 101 30 106 22 Z" fill="#9fd3ff" stroke="#141210" stroke-width="2.5" />
          <!-- angry shield -->
          <path d="M64 22 L98 33 V61 C98 84 83 100 64 109 C45 100 30 84 30 61 V33 Z" fill="#e6301e" stroke="#141210" stroke-width="5" stroke-linejoin="round" />
          <rect x="20" y="16" width="88" height="100" fill="url(#tone-b)" clip-path="url(#shield-clip-b)" />
          <line x1="42" y1="41" x2="57" y2="48" stroke="#141210" stroke-width="6.5" stroke-linecap="round" />
          <line x1="86" y1="41" x2="71" y2="48" stroke="#141210" stroke-width="6.5" stroke-linecap="round" />
          <circle cx="50" cy="59" r="6" fill="#fffdf7" stroke="#141210" stroke-width="3" />
          <circle cx="78" cy="59" r="6" fill="#fffdf7" stroke="#141210" stroke-width="3" />
          <circle cx="52.4" cy="60.6" r="2.6" fill="#141210" />
          <circle cx="75.6" cy="60.6" r="2.6" fill="#141210" />
          <ellipse cx="64" cy="85" rx="10.5" ry="12" fill="#141210" />
          <rect x="56.5" y="74.5" width="15" height="5.5" rx="2.5" fill="#fffdf7" />
        </svg>
        <div class="red-card"></div>
      </div>
      <h1>Blocked!!</h1>
      <p class="subtitle">Sent off by Brostrict F.C.</p>
      <div class="url-chip" id="url-chip"><span id="url-host"></span></div>
      <div class="notice" id="notice">
        Yellow card — this URL is whitelisted, you may proceed
      </div>
      <div class="button-group">
        <button id="proceed-btn" style="display: none;">Proceed</button>
        <button id="go-back-btn" class="secondary">Go Back</button>
      </div>
      <div class="footer">
        <svg width="18" height="18" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
          <path d="M64 22 L98 33 V61 C98 84 83 100 64 109 C45 100 30 84 30 61 V33 Z" fill="#e6301e" stroke="#141210" stroke-width="6" stroke-linejoin="round" />
          <line x1="42" y1="41" x2="57" y2="48" stroke="#141210" stroke-width="8" stroke-linecap="round" />
          <line x1="86" y1="41" x2="71" y2="48" stroke="#141210" stroke-width="8" stroke-linecap="round" />
          <circle cx="50" cy="59" r="6" fill="#fffdf7" stroke="#141210" stroke-width="3.5" />
          <circle cx="78" cy="59" r="6" fill="#fffdf7" stroke="#141210" stroke-width="3.5" />
          <ellipse cx="64" cy="85" rx="10.5" ry="12" fill="#141210" />
        </svg>
        <span>Brostrict F.C. — No mercy for distractions</span>
      </div>
    </div>
    <script>
      let detectedUrl = '';
      if (window.location.ancestorOrigins && window.location.ancestorOrigins.length > 0) {
        detectedUrl = window.location.ancestorOrigins[0];
      } else if (document.referrer) {
        detectedUrl = document.referrer;
      }

      if (detectedUrl) {
        try {
          const host = new URL(detectedUrl).hostname;
          if (host) {
            document.getElementById('url-host').textContent = host;
            document.getElementById('url-chip').style.display = 'inline-flex';
          }
        } catch {
          // no valid URL detected — chip stays hidden
        }

        chrome.runtime.sendMessage({ type: 'isWhitelisted', url: detectedUrl }, (response) => {
          if (response && response.result) {
            document.getElementById('notice').style.display = 'block';
            document.getElementById('proceed-btn').style.display = 'inline-block';
          }
        });
      }

      document.getElementById('proceed-btn').addEventListener('click', () => {
        if (detectedUrl) {
          window.location.href = detectedUrl;
        }
      });

      document.getElementById('go-back-btn').addEventListener('click', () => {
        if (window.history.length > 1) {
          window.history.back();
        } else if (detectedUrl) {
          try {
            const domain = new URL(detectedUrl).hostname;
            window.location.href = 'https://' + domain;
          } catch {
            window.close();
          }
        } else {
          window.close();
        }
      });
    </script>
  </body>
</html>
