<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Brostrict</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bangers&family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: #f6efe2;
        --panel: #fffdf7;
        --ink: #141210;
        --ink-soft: #55504a;
        --red: #e6301e;
        --red-dark: #c92a12;
        --red-deep: #8f1d0f;
        --green: #2f9e44;
        --yellow: #ffd43b;
        --shadow: 4px 4px 0 var(--ink);
        --radius: 14px;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        color-scheme: light;
      }
      body {
        font-family:
          'Space Grotesk',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          sans-serif;
        width: 340px;
        background: var(--paper);
        background-image: radial-gradient(circle, rgba(20, 18, 16, 0.07) 1px, transparent 1.3px);
        background-size: 9px 9px;
        color: var(--ink);
        padding: 16px;
      }
      ::selection {
        background: var(--red);
        color: var(--paper);
      }
      .header {
        display: flex;
        align-items: center;
        gap: 11px;
        padding: 2px 2px 0;
        margin-bottom: 14px;
      }
      .header .logo {
        flex-shrink: 0;
        width: 40px;
        height: 40px;
        transform: rotate(-3deg);
        transition: transform 0.2s ease;
      }
      .header .logo:hover {
        transform: rotate(3deg) scale(1.06);
        animation: shake 0.35s ease-in-out;
      }
      @keyframes shake {
        0%, 100% { transform: rotate(3deg) scale(1.06); }
        25% { transform: rotate(0deg) scale(1.08); }
        75% { transform: rotate(6deg) scale(1.08); }
      }
      .header .logo svg {
        display: block;
        width: 40px;
        height: 40px;
      }
      .header h1 {
        font-family: 'Bangers', 'Impact', sans-serif;
        font-size: 1.65rem;
        font-weight: 400;
        color: var(--ink);
        letter-spacing: 1.5px;
        line-height: 1;
        transform: skew(-3deg);
      }
      .header h1 span {
        color: var(--red);
        text-shadow: 1.5px 1.5px 0 var(--ink);
      }
      .header h1::after {
        content: '';
        display: block;
        width: 78%;
        height: 5px;
        margin-top: 3px;
        background: var(--red);
        border: 1.5px solid var(--ink);
        border-radius: 3px;
        transform: rotate(-1deg);
      }
      .header p {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.56rem;
        color: var(--ink-soft);
        text-transform: uppercase;
        letter-spacing: 2.2px;
        margin-top: 5px;
        line-height: 1.7;
      }
      .container {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .card {
        background: var(--panel);
        border: 2.5px solid var(--ink);
        border-radius: var(--radius);
        padding: 12px;
        box-shadow: var(--shadow);
        transition: box-shadow 0.15s ease, transform 0.15s ease;
      }
      .card:hover {
        box-shadow: 5px 5px 0 var(--ink);
        transform: translate(-1px, -1px);
      }
      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }
      .card-header h3 {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: 'Bangers', 'Impact', sans-serif;
        font-size: 0.95rem;
        font-weight: 400;
        color: var(--ink);
        text-transform: uppercase;
        letter-spacing: 1.6px;
      }
      .protection-card .card-header h3::before {
        content: '';
        width: 16px;
        height: 10px;
        border-radius: 50%;
        background: var(--panel);
        background-image: radial-gradient(circle at center, var(--ink) 2.5px, transparent 3px);
        border: 2.5px solid var(--ink);
      }
      .blacklist-card .card-header h3::before {
        content: '';
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: 2.5px solid var(--red);
        background: linear-gradient(to bottom right, transparent 43%, var(--red) 43%, var(--red) 57%, transparent 57%);
        transform: rotate(-6deg);
      }
      .whitelist-card .card-header h3::before {
        content: '';
        width: 11px;
        height: 6px;
        border-left: 3.5px solid var(--green);
        border-bottom: 3.5px solid var(--green);
        transform: rotate(-45deg) translate(1px, -1px);
        filter: drop-shadow(1px 1px 0 var(--ink));
      }
      .protection-card .card-header {
        margin-bottom: 0;
      }
      .toggle {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 4px 12px;
        border: 2.5px solid var(--ink);
        border-radius: 999px;
        font-size: 0.62rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.15s ease;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        font-family: 'Space Grotesk', sans-serif;
        background: var(--panel);
        color: var(--ink-soft);
        box-shadow: 2.5px 2.5px 0 var(--ink);
      }
      .toggle::before {
        content: '';
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--ink-soft);
        border: 1.5px solid var(--ink);
        transition: all 0.15s ease;
      }
      .toggle:hover {
        transform: translate(-1px, -1px);
        box-shadow: 3.5px 3.5px 0 var(--ink);
      }
      .toggle:active {
        transform: translate(1.5px, 1.5px);
        box-shadow: 1px 1px 0 var(--ink);
      }
      .toggle.active {
        background: var(--red);
        color: var(--paper);
      }
      .toggle.active::before {
        background: var(--yellow);
      }
      .input-row {
        display: flex;
        gap: 8px;
        min-width: 0;
        overflow: hidden;
      }
      .input-row input {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        padding: 9px 12px;
        border: 2.5px solid var(--ink);
        border-radius: 10px;
        background: var(--paper);
        color: var(--ink);
        font-size: 0.78rem;
        font-family: 'IBM Plex Mono', monospace;
        transition: box-shadow 0.15s ease, transform 0.15s ease;
      }
      .input-row input:focus {
        outline: none;
        box-shadow: 3px 3px 0 var(--red);
        transform: translate(-1px, -1px);
        background: var(--panel);
      }
      .input-row input::placeholder {
        color: var(--ink-soft);
        opacity: 0.6;
        font-family: 'Space Grotesk', sans-serif;
      }
      .input-row button {
        padding: 9px 15px;
        background: var(--red);
        color: var(--paper);
        border: 2.5px solid var(--ink);
        border-radius: 10px;
        cursor: pointer;
        font-size: 0.78rem;
        font-weight: 400;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        font-family: 'Bangers', 'Impact', sans-serif;
        box-shadow: 3px 3px 0 var(--ink);
        transition: all 0.15s ease;
      }
      .input-row button:hover {
        transform: translate(-1px, -1px);
        box-shadow: 4px 4px 0 var(--ink);
        background: var(--red-dark);
      }
      .input-row button:active {
        transform: translate(2px, 2px);
        box-shadow: 1px 1px 0 var(--ink);
      }
      .list {
        list-style: none;
        max-height: 96px;
        overflow-y: auto;
        margin-top: 10px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .list:empty {
        margin-top: 0;
      }
      .list::-webkit-scrollbar {
        width: 6px;
      }
      .list::-webkit-scrollbar-track {
        background: transparent;
      }
      .list::-webkit-scrollbar-thumb {
        background: var(--ink);
        border-radius: 3px;
      }
      .list-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 7px 10px;
        background: var(--paper);
        border: 2px solid var(--ink);
        border-radius: 10px;
        font-size: 0.75rem;
        overflow: hidden;
        transition: all 0.15s ease;
      }
      .list-item:hover {
        background: var(--panel);
        box-shadow: 2.5px 2.5px 0 var(--ink);
        transform: translate(-1px, -1px);
      }
      .list-item span {
        word-break: break-all;
        color: var(--ink);
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.72rem;
        font-weight: 500;
      }
      .item-actions {
        display: flex;
        gap: 2px;
        margin-left: 6px;
        flex-shrink: 0;
      }
      .edit-btn,
      .remove-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
        background: transparent;
        color: var(--ink);
        border: 2px solid transparent;
        border-radius: 7px;
        font-size: 0.8rem;
        cursor: pointer;
        transition: all 0.15s ease;
      }
      .edit-btn:hover {
        background: var(--yellow);
        border-color: var(--ink);
      }
      .remove-btn {
        font-size: 1rem;
      }
      .remove-btn:hover {
        background: var(--red);
        color: var(--paper);
        border-color: var(--ink);
      }
      .list-item.editing {
        padding: 5px 6px 5px 8px;
        gap: 6px;
        background: var(--panel);
        box-shadow: 2.5px 2.5px 0 var(--ink);
      }
      .edit-input {
        flex: 1;
        min-width: 0;
        padding: 6px 9px;
        border: 2px solid var(--red);
        border-radius: 8px;
        background: var(--panel);
        color: var(--ink);
        font-size: 0.72rem;
        font-family: 'IBM Plex Mono', monospace;
      }
      .edit-input:focus {
        outline: none;
      }
      .edit-actions {
        display: flex;
        gap: 2px;
        flex-shrink: 0;
      }
      .save-btn,
      .cancel-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
        background: transparent;
        border: 2px solid transparent;
        border-radius: 7px;
        font-size: 0.8rem;
        cursor: pointer;
        transition: all 0.15s ease;
      }
      .save-btn {
        color: var(--green);
      }
      .save-btn:hover {
        background: var(--green);
        color: var(--paper);
        border-color: var(--ink);
      }
      .cancel-btn {
        color: var(--red);
      }
      .cancel-btn:hover {
        background: var(--red);
        color: var(--paper);
        border-color: var(--ink);
      }
      button:focus-visible,
      input:focus-visible {
        outline: 2.5px dashed var(--red);
        outline-offset: 2px;
      }
    </style>
  </head>

      </div>
      <div>
        <h1>Bro<span>strict</span></h1>
        <p>your personal nah machine</p>
