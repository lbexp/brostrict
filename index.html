<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Brostrict</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;600&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Comfortaa', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        width: 320px;
        background: #0a0a0a;
        color: #e5e5e5;
        padding: 24px 20px;
      }
      .header {
        text-align: center;
        margin-bottom: 24px;
      }
      .header h1 {
        font-size: 1.6rem;
        font-weight: 600;
        color: #ffffff;
        letter-spacing: -0.5px;
        margin-bottom: 4px;
      }
      .header p {
        font-size: 0.7rem;
        color: #555;
        font-weight: 300;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      .container {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .card {
        background: #111111;
        border: 1px solid #1e1e1e;
        border-radius: 16px;
        padding: 16px;
      }
      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }
      .card-header h3 {
        font-size: 0.7rem;
        color: #666;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        font-weight: 600;
      }
      .toggle {
        padding: 6px 14px;
        border: 1px solid #333;
        border-radius: 20px;
        font-size: 0.7rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        font-family: 'Comfortaa', sans-serif;
      }
      .toggle.active {
        background: #ffffff;
        color: #0a0a0a;
        border-color: #ffffff;
      }
      .toggle.inactive {
        background: transparent;
        color: #444;
        border-color: #333;
      }
      .input-row {
        display: flex;
        gap: 8px;
        min-width: 0;
        overflow: hidden;
      }
      .input-row input {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        padding: 12px 14px;
        border: 1px solid #222;
        border-radius: 12px;
        background: #0a0a0a;
        color: #e5e5e5;
        font-size: 0.85rem;
        font-family: 'IBM Plex Mono', monospace;
      }
      .input-row input:focus {
        outline: none;
        border-color: #444;
      }
      .input-row input::placeholder {
        color: #333;
        font-family: 'Comfortaa', sans-serif;
      }
      .input-row button {
        padding: 12px 20px;
        background: #ffffff;
        color: #0a0a0a;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-size: 0.8rem;
        font-weight: 600;
        font-family: 'Comfortaa', sans-serif;
        transition: all 0.2s;
      }
      .input-row button:hover {
        background: #e5e5e5;
        transform: translateY(-1px);
      }
      .input-row button:active {
        transform: translateY(0);
      }
      .list {
        list-style: none;
        max-height: 100px;
        overflow-y: auto;
        margin-top: 12px;
      }
      .list::-webkit-scrollbar {
        width: 4px;
      }
      .list::-webkit-scrollbar-track {
        background: transparent;
      }
      .list::-webkit-scrollbar-thumb {
        background: #222;
        border-radius: 2px;
      }
      .list-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 12px;
        background: #0a0a0a;
        border: 1px solid #1a1a1a;
        border-radius: 10px;
        margin-bottom: 6px;
        font-size: 0.8rem;
        overflow: hidden;
      }
      .list-item span {
        word-break: break-all;
        color: #777;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.75rem;
      }
      .remove-btn {
        background: transparent;
        color: #444;
        border: none;
        font-size: 0.9rem;
        cursor: pointer;
        padding: 0 6px;
        margin-left: 8px;
        transition: color 0.2s;
      }
      .remove-btn:hover {
        color: #888;
      }
      .footer {
        text-align: center;
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px solid #111;
      }
      .footer p {
        font-size: 0.6rem;
        color: #333;
        letter-spacing: 1px;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Brostrict</h1>
      <p>Block Distractions</p>
    </div>
    <div id="app"></div>
    <div class="footer">
      <p>Stay Focused</p>
    </div>
    <script src="index.js"></script>
  </body>
</html>
